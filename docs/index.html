<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة معلومات عامة</title>

  <!-- ربط ملف manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- ألوان التطبيق -->
  <meta name="theme-color" content="#a678d8">

  <!-- تسجيل Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => console.log("Service Worker مسجل بنجاح"))
        .catch(err => console.error("خطأ في تسجيل Service Worker:", err));
    }
  </script>

  <!-- ربط ملف CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>لعبة معلومات عامة ممتعة</h1>
  </header>

  <main>
    <!-- زر بدء اللعبة -->
    <button id="startBtn">ابدأ اللعبة</button>

    <!-- مكان عرض الأسئلة -->
    <div id="quizContainer" class="quiz-container">
      <!-- هنا سيظهر السؤال والاختيارات -->
    </div>
  </main>

  <!-- ربط ملف JavaScript -->
  <script src="script.js"></script>
</body>
</html>
